<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StravaStick</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--orange:#FC4C02;--orange2:#d93f01;--bg:#0c0c0c;--s1:#161616;--s2:#1e1e1e;--s3:#272727;--bd:rgba(255,255,255,0.07);--bd2:rgba(255,255,255,0.13);--tx:#ede9e4;--tx2:#888;--tx3:#555;--green:#22c55e}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:'DM Mono',monospace;min-height:100vh;overflow-x:hidden}
header{display:flex;align-items:center;justify-content:space-between;padding:13px 22px;border-bottom:1px solid var(--bd);position:sticky;top:0;background:rgba(12,12,12,0.96);backdrop-filter:blur(12px);z-index:100}
.logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:20px;letter-spacing:.5px}
.logo em{color:var(--orange);font-style:normal}
#auth-area{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.tab-pill{display:flex;background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:3px;gap:2px}
.tab-btn{background:transparent;border:none;color:var(--tx2);font-family:'DM Mono',monospace;font-size:11px;padding:5px 12px;border-radius:6px;cursor:pointer;transition:all .15s;white-space:nowrap}
.tab-btn.on{background:var(--orange);color:#fff}
.auth-panel{display:flex;align-items:center;gap:8px}
.auth-panel input{background:var(--s2);border:1px solid var(--bd);color:var(--tx);font-family:'DM Mono',monospace;font-size:11px;padding:7px 11px;border-radius:8px;width:160px;transition:border-color .2s}
.auth-panel input:focus{outline:none;border-color:var(--orange)}
.auth-panel input::placeholder{color:var(--tx3)}
.btn-connect{background:var(--orange);color:#fff;border:none;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;letter-spacing:.5px;padding:8px 15px;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .2s;white-space:nowrap}
.btn-connect:hover{background:var(--orange2)}
.btn-connect svg{width:14px;height:14px;flex-shrink:0}
.badge-connected{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--green);background:rgba(34,197,94,.07);padding:7px 12px;border-radius:8px;border:1px solid rgba(34,197,94,.15)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.app{display:grid;grid-template-columns:270px 1fr 290px;min-height:calc(100vh - 51px)}
/* LEFT */
.panel-left{border-right:1px solid var(--bd);display:flex;flex-direction:column}
.ptitle{padding:12px 15px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:1.5px;color:var(--tx2);text-transform:uppercase;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.ptitle small{font-size:10px;font-family:'DM Mono',monospace;font-weight:400;text-transform:none;letter-spacing:0;color:var(--tx3)}
.act-list{overflow-y:auto;flex:1;max-height:calc(100vh - 51px - 41px)}
.act-list::-webkit-scrollbar{width:3px}
.act-list::-webkit-scrollbar-thumb{background:var(--s3);border-radius:2px}
.act-item{padding:11px 15px;border-bottom:1px solid var(--bd);cursor:pointer;transition:background .13s;border-left:2px solid transparent}
.act-item:hover{background:var(--s1)}
.act-item.sel{background:rgba(252,76,2,.06);border-left-color:var(--orange)}
.act-name{font-size:11px;color:var(--tx);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.act-date{font-size:10px;color:var(--tx3);margin-top:2px}
.act-row{display:flex;gap:10px;margin-top:4px}
.act-stat{font-size:11px;color:var(--tx2)}
.act-stat b{color:var(--orange);font-weight:500}
.empty-state{padding:28px 16px;text-align:center;color:var(--tx3);font-size:11px;line-height:1.9}
.empty-state svg{width:28px;height:28px;opacity:.18;margin:0 auto 10px;display:block}
/* CENTER */
.panel-center{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:16px;background:#0f0f0f}
.cv-wrap{position:relative;border-radius:12px;overflow:hidden;box-shadow:0 0 80px rgba(252,76,2,.09)}
#main-canvas{display:block;max-width:100%;max-height:60vh;width:auto;height:auto}
.cv-empty{width:260px;height:450px;background:var(--s1);border:1.5px dashed var(--bd2);border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;color:var(--tx3);font-size:11px;text-align:center;padding:20px}
.cv-empty svg{width:32px;height:32px;opacity:.18}
.step-hint{font-size:10px;color:var(--tx3);background:var(--s1);border:1px solid var(--bd);border-radius:8px;padding:7px 13px;display:flex;align-items:center;gap:6px;max-width:420px;text-align:center}
.step-hint em{color:var(--orange);font-style:normal}
.cv-actions{display:flex;gap:7px;flex-wrap:wrap;justify-content:center}
.btn-a{background:var(--s2);border:1px solid var(--bd);color:var(--tx);font-family:'DM Mono',monospace;font-size:10px;padding:7px 13px;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .15s;white-space:nowrap}
.btn-a:hover{background:var(--s3);border-color:var(--bd2)}
.btn-a.pri{background:var(--orange);border-color:var(--orange);color:#fff}
.btn-a.pri:hover{background:var(--orange2)}
.btn-a svg{width:12px;height:12px;flex-shrink:0}
/* RIGHT */
.panel-right{border-left:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden}
.asc-card{margin:12px;background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:11px}
.asc-title{font-size:11px;font-weight:500;color:var(--tx);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.asc-date{font-size:9px;color:var(--tx3);margin-bottom:8px}
.asc-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.asc-s{background:var(--s3);border-radius:7px;padding:7px;text-align:center}
.asc-v{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:19px;color:var(--orange);line-height:1}
.asc-l{font-size:8px;color:var(--tx3);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}
/* TEMPLATES */
.tpl-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;padding:12px}
.tpl-card{aspect-ratio:9/16;background:var(--s2);border:1.5px solid var(--bd);border-radius:10px;cursor:pointer;overflow:hidden;position:relative;transition:border-color .15s}
.tpl-card:hover{border-color:var(--bd2)}
.tpl-card.sel{border-color:var(--orange)}
.tpl-card img{width:100%;height:100%;object-fit:cover;display:block}
.tpl-lbl{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.75));padding:8px 5px 4px;font-size:8px;color:rgba(255,255,255,.6);text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tpl-upload{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;font-size:9px;color:var(--tx3);border:1.5px dashed var(--bd2);cursor:pointer}
.tpl-upload:hover{border-color:var(--orange);color:var(--tx2)}
.tpl-upload svg{width:18px;height:18px;opacity:.35}
/* CONTROLS */
.controls{border-top:1px solid var(--bd);padding:12px;display:flex;flex-direction:column;gap:9px;overflow-y:auto;flex:1}
.ctrl-section-title{font-size:9px;color:var(--tx2);letter-spacing:1.2px;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif;font-weight:700}
.stat-togs{display:flex;gap:4px;flex-wrap:wrap}
.stog{display:flex;align-items:center;gap:4px;font-size:9px;padding:3px 8px;background:var(--s2);border:1px solid var(--bd);border-radius:6px;cursor:pointer;color:var(--tx2);transition:all .13s;user-select:none}
.stog.on{border-color:var(--orange);background:rgba(252,76,2,.07);color:var(--tx)}
.stog input{display:none}
.crow{display:flex;align-items:center;justify-content:space-between;gap:8px}
.clbl{font-size:9px;color:var(--tx2);min-width:56px;white-space:nowrap}
.crow input[type=range]{flex:1;accent-color:var(--orange)}
.cval{font-size:9px;color:var(--tx3);min-width:26px;text-align:right}
.crow input[type=color]{width:26px;height:24px;border:1px solid var(--bd);border-radius:5px;background:var(--s2);cursor:pointer;padding:2px}
.tog-row{display:flex;gap:3px}
.tog{background:var(--s2);border:1px solid var(--bd);color:var(--tx2);font-family:'DM Mono',monospace;font-size:9px;padding:3px 8px;border-radius:5px;cursor:pointer;transition:all .13s}
.tog.on{background:var(--orange);border-color:var(--orange);color:#fff}
/* SHARE */
.share-wrap{padding:12px;border-top:1px solid var(--bd)}
.btn-share{width:100%;background:var(--orange);border:none;color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:16px;letter-spacing:.5px;padding:13px;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:background .18s}
.btn-share:hover{background:var(--orange2)}
.btn-share svg{width:16px;height:16px}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--s3);border:1px solid var(--bd2);color:var(--tx);font-size:11px;padding:9px 16px;border-radius:9px;z-index:999;opacity:0;transition:opacity .22s;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1}
input[type=file]{display:none}
@media(max-width:960px){.app{grid-template-columns:1fr}.panel-left,.panel-right{border:none;border-bottom:1px solid var(--bd)}.act-list{max-height:220px}}
</style>
</head>
<body>

<header>
  <div class="logo">STRAVA<em>STICK</em></div>
  <div id="auth-area">
    <div class="tab-pill" id="auth-tabs">
      <button class="tab-btn on" id="tb-oauth" onclick="switchTab('oauth')">OAuth</button>
      <button class="tab-btn" id="tb-token" onclick="switchTab('token')">Token</button>
    </div>
    <div class="auth-panel" id="panel-oauth">
      <button class="btn-connect" onclick="window.location='/api/strava-auth'">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15.387 17.944l-2.089-4.116h-3.065L15.387 24l5.15-10.172h-3.066m-7.008-5.599l2.836 5.598h4.172L10.463 0l-7 13.828h4.169"/></svg>
        Connect
      </button>
    </div>
    <div class="auth-panel" id="panel-token" style="display:none">
      <input id="in-tok" type="password" placeholder="Paste access_token" />
      <button class="btn-connect" onclick="doToken()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        Pakai
      </button>
    </div>
    <div id="badge-slot"></div>
  </div>
</header>

<div class="app">

  <!-- LEFT: ACTIVITIES -->
  <div class="panel-left">
    <div class="ptitle">Aktivitas Lari <small id="act-count"></small></div>
    <div class="act-list" id="act-list">
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
        Connect Strava untuk<br>melihat aktivitas larimu
      </div>
    </div>
  </div>

  <!-- CENTER: CANVAS -->
  <div class="panel-center">
    <div id="cv-empty" class="cv-empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="m3 9 5-5 4 4 4-4 5 5"/><circle cx="8.5" cy="13.5" r="1.5"/></svg>
      <span>Pilih aktivitas &amp; template</span>
    </div>
    <div id="cv-wrap" class="cv-wrap" style="display:none">
      <canvas id="main-canvas" width="1080" height="1920"></canvas>
    </div>
    <div class="step-hint" id="step-hint">
      <em>①</em> Connect Strava &nbsp;→&nbsp; <em>②</em> Pilih lari &nbsp;→&nbsp; <em>③</em> Pilih template
    </div>
    <div class="cv-actions">
      <button class="btn-a" onclick="doRender()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-.68-8.49"/></svg>
        Refresh
      </button>
      <button class="btn-a pri" onclick="doDownload()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download PNG
      </button>
    </div>
  </div>

  <!-- RIGHT: TEMPLATES + CONTROLS -->
  <div class="panel-right">
    <div class="ptitle">Template &amp; Kontrol</div>

    <!-- Activity summary -->
    <div id="asc-wrap" style="display:none">
      <div class="asc-card" id="asc"></div>
    </div>

    <!-- Template grid -->
    <div class="tpl-grid" id="tpl-grid">
      <label class="tpl-card tpl-upload" onclick="document.getElementById('tpl-file').click()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <span>Upload<br>Template PNG</span>
      </label>
    </div>
    <input type="file" id="tpl-file" accept="image/png,image/jpeg,image/webp" onchange="uploadTemplate(event)">
    <!-- Input gambar user untuk overlay di belakang kartu -->
    <input type="file" id="user-img-file" accept="image/png,image/jpeg,image/webp" style="display:none" onchange="uploadUserImg(event)">
    <button class="btn-a" style="margin:10px 0 0 0" onclick="document.getElementById('user-img-file').click()">Upload Gambar untuk Di-overlay</button>

    <!-- Controls -->
    <div class="controls">
      <div class="ctrl-section-title">Tampilkan Stats</div>
      <div class="stat-togs">
        <label class="stog on" id="stog-dist"><input type="checkbox" checked onchange="syncStog(this);doRender()">Jarak</label>
        <label class="stog on" id="stog-pace"><input type="checkbox" checked onchange="syncStog(this);doRender()">Pace</label>
        <label class="stog on" id="stog-hr"><input type="checkbox" checked onchange="syncStog(this);doRender()">HR</label>
        <label class="stog on" id="stog-time"><input type="checkbox" checked onchange="syncStog(this);doRender()">Waktu</label>
        <label class="stog on" id="stog-elev"><input type="checkbox" checked onchange="syncStog(this);doRender()">Elevasi</label>
        <label class="stog on" id="stog-cad"><input type="checkbox" checked onchange="syncStog(this);doRender()">Cadence</label>
      </div>

      <div class="crow">
        <span class="clbl">Posisi Y</span>
        <input type="range" id="ctrl-y" min="5" max="92" value="78" oninput="upReadouts();doRender()">
        <span class="cval" id="cv-y">78%</span>
      </div>
      <div class="crow">
        <span class="clbl">Font size</span>
        <input type="range" id="ctrl-fs" min="28" max="110" value="56" oninput="upReadouts();doRender()">
        <span class="cval" id="cv-fs">56</span>
      </div>
      <div class="crow">
        <span class="clbl">Warna</span>
        <input type="color" id="ctrl-color" value="#FC4C02" oninput="doRender()">
        <div class="tog-row">
          <button class="tog on" id="al-left"   onclick="setAlign('left')">L</button>
          <button class="tog"    id="al-center" onclick="setAlign('center')">C</button>
          <button class="tog"    id="al-right"  onclick="setAlign('right')">R</button>
        </div>
      </div>
      <div class="crow">
        <span class="clbl">Background</span>
        <div class="tog-row">
          <button class="tog on" id="bg-none" onclick="setBg('none')">None</button>
          <button class="tog"    id="bg-dark" onclick="setBg('dark')">Dark</button>
          <button class="tog"    id="bg-pill" onclick="setBg('pill')">Pill</button>
        </div>
      </div>
    </div>

    <div class="share-wrap">
      <button class="btn-share" onclick="doShare()">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
        Share ke IG Story
      </button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const S = {
  token:null, activities:[], selAct:null, templates:[], selTpl:null, align:'left', bg:'none',
  userImg:null, userImgObj:null,
  drag:{ active:false, type:null, offsetX:0, offsetY:0 },
  overlayPos:{ dist:{x:540,y:420}, hr:{x:540,y:520} }
};
// Tambahkan preset template kartu (Sprint card)
window.addEventListener('DOMContentLoaded',()=>{
  const img=new Image();
  img.onload=()=>{
    S.templates.unshift({name:'Sprint Card',img,isCard:true});
    renderTplGrid();
  };
  img.src='https://cdn.jsdelivr.net/gh/iraphic/stravastick-assets@main/sprint-card-base.png';
});
// Upload gambar user untuk overlay di belakang kartu
function uploadUserImg(e){
  const file = e.target.files[0]; if (!file) return;
  const r = new FileReader();
  r.onload = ev => {
    const img = new Image();
    img.onload = () => {
      S.userImgObj = img;
      S.userImg = ev.target.result;
      doRender();
      toast('✓ Gambar siap di-overlay');
    };
    img.src = ev.target.result;
  };
  r.readAsDataURL(file);
}
const canvas = document.getElementById('main-canvas');
const ctx = canvas.getContext('2d');

// AUTH
function switchTab(t) {
  ['oauth','token'].forEach(v => {
    document.getElementById('tb-'+v).classList.toggle('on', v===t);
    document.getElementById('panel-'+v).style.display = v===t ? 'flex' : 'none';
  });
}
function doOAuth() {
  // Tidak dipakai lagi, digantikan backend OAuth
  window.location = '/api/strava-auth';
}
function doToken() {
  const t = document.getElementById('in-tok').value.trim();
  if (!t) { toast('⚠ Paste token dulu'); return; }
  S.token = t; loadActivities();
}
function parseURL() {
  // Cek access_token di query string (dari backend)
  const q = new URLSearchParams(window.location.search);
  const t = q.get('access_token');
  if (t) { S.token = t; history.replaceState(null,'',location.pathname); loadActivities(); return; }
  // Fallback: hash (legacy)
  const h = new URLSearchParams(location.hash.slice(1));
  const th = h.get('access_token');
  if (th) { S.token = th; history.replaceState(null,'',location.pathname); loadActivities(); }
}
function showBadge(name) {
  document.getElementById('auth-tabs').style.display = 'none';
  document.getElementById('panel-oauth').style.display = 'none';
  document.getElementById('panel-token').style.display = 'none';
  document.getElementById('badge-slot').innerHTML = `<div class="badge-connected"><div class="dot"></div>${name}</div>`;
}

// LOAD ACTIVITIES
async function loadActivities() {
  toast('⏳ Mengambil data...');
  try {
    const h = { Authorization:'Bearer '+S.token };
    const ath = await (await fetch('https://www.strava.com/api/v3/athlete',{headers:h})).json();
    if (ath.errors) throw new Error('Token tidak valid');
    showBadge(ath.firstname+' '+ath.lastname);
    const acts = await (await fetch('https://www.strava.com/api/v3/athlete/activities?per_page=30',{headers:h})).json();
    S.activities = acts.filter(a => a.sport_type==='Run'||a.type==='Run');
    renderList();
    toast('✓ '+S.activities.length+' lari dimuat');
  } catch(e) { toast('⚠ '+e.message); }
}

function renderList() {
  document.getElementById('act-count').textContent = S.activities.length+' lari';
  const el = document.getElementById('act-list');
  if (!S.activities.length) { el.innerHTML='<div class="empty-state">Tidak ada aktivitas lari</div>'; return; }
  el.innerHTML = S.activities.map((a,i) => {
    const km   = (a.distance/1000).toFixed(2);
    const pace = sp(a.moving_time/(a.distance/1000));
    const dt   = new Date(a.start_date_local).toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'});
    const hr   = a.average_heartrate ? `<div class="act-stat"><b>${Math.round(a.average_heartrate)}</b> bpm</div>` : '';
    return `<div class="act-item" data-i="${i}" onclick="selAct(${i})">
      <div class="act-name">${a.name}</div>
      <div class="act-date">${dt}</div>
      <div class="act-row">
        <div class="act-stat"><b>${km}</b> km</div>
        <div class="act-stat"><b>${pace}</b>/km</div>
        ${hr}
      </div>
    </div>`;
  }).join('');
}

function selAct(i) {
  S.selAct = S.activities[i];
  document.querySelectorAll('.act-item').forEach((el,j) => el.classList.toggle('sel',j===i));
  renderActCard();
  doRender();
  updateHint();
}

function renderActCard() {
  const a = S.selAct; if (!a) return;
  const km  = (a.distance/1000).toFixed(2);
  const dt  = new Date(a.start_date_local).toLocaleDateString('id-ID',{weekday:'short',day:'numeric',month:'short'});
  const stats = [
    {v: km,                                                 l:'km'},
    {v: sp(a.moving_time/(a.distance/1000)),                l:'pace /km'},
    {v: sd(a.moving_time),                                  l:'durasi'},
    {v: a.average_heartrate ? Math.round(a.average_heartrate)+'': '—', l:'hr avg'},
    {v: a.max_heartrate     ? Math.round(a.max_heartrate)+'' : '—',    l:'hr max'},
    {v: a.total_elevation_gain ? Math.round(a.total_elevation_gain)+'m':'—', l:'elevasi'},
  ].map(s=>`<div class="asc-s"><div class="asc-v">${s.v}</div><div class="asc-l">${s.l}</div></div>`).join('');
  document.getElementById('asc-wrap').style.display = 'block';
  document.getElementById('asc').innerHTML = `<div class="asc-title">${a.name}</div><div class="asc-date">${dt}</div><div class="asc-grid">${stats}</div>`;
}

// TEMPLATES
function uploadTemplate(e) {
  const file = e.target.files[0]; if (!file) return;
  const r = new FileReader();
  r.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const t = { name: file.name.replace(/\.[^.]+$/,''), img };
      S.templates.push(t); S.selTpl = t;
      renderTplGrid(); doRender();
      toast('✓ Template ditambahkan');
    };
    img.src = ev.target.result;
  };
  r.readAsDataURL(file);
}

function renderTplGrid() {
  const g = document.getElementById('tpl-grid');
  const cards = S.templates.map((t,i) => {
    const c = document.createElement('canvas'); c.width=90; c.height=160;
    c.getContext('2d').drawImage(t.img,0,0,90,160);
    const sel = S.selTpl===t?'sel':'';
    return `<div class="tpl-card ${sel}" onclick="selTpl(${i})">
      <img src="${c.toDataURL()}" /><div class="tpl-lbl">${t.name}</div>
    </div>`;
  }).join('');
  g.innerHTML = cards + `<label class="tpl-card tpl-upload" onclick="document.getElementById('tpl-file').click()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    <span>Upload<br>Template</span>
  </label>`;
}

function selTpl(i) { S.selTpl=S.templates[i]; renderTplGrid(); doRender(); }

// CANVAS
function doRender() {
  upReadouts();
  if (!S.selTpl) return;
  const tpl = S.selTpl.img;
  canvas.width=tpl.width||1080; canvas.height=tpl.height||1920;
  document.getElementById('cv-empty').style.display='none';
  document.getElementById('cv-wrap').style.display='block';
  ctx.clearRect(0,0,canvas.width,canvas.height);
  // Jika template kartu dan ada userImg, gambar userImg dulu
  if(S.selTpl.isCard && S.userImgObj){ ctx.drawImage(S.userImgObj, 60, 90, canvas.width-120, 320); }
  ctx.drawImage(tpl,0,0,canvas.width,canvas.height);
  if (S.selAct) drawStats();
  updateHint();
}

function drawStats() {
  const a=S.selAct, W=canvas.width, H=canvas.height, sc=W/1080;
  // Khusus template kartu: hanya jarak & heartrate, font Gill Sans, warna hitam, posisi drag
  if(S.selTpl && S.selTpl.isCard){
    ctx.textAlign='center';
    ctx.font = `bold ${Math.round(54*sc)}px 'Gill Sans', 'Arial', sans-serif`;
    ctx.fillStyle = '#111';
    // Jarak
    const dist = (a.distance/1000).toFixed(2)+' km';
    ctx.fillText(dist, S.overlayPos.dist.x, S.overlayPos.dist.y);
    // Heartrate
    if(a.average_heartrate)
      ctx.fillText(Math.round(a.average_heartrate)+' bpm', S.overlayPos.hr.x, S.overlayPos.hr.y);
    return;
  }
  // ...existing code for non-card template...
  const yPct=+document.getElementById('ctrl-y').value;
  const fs=+document.getElementById('ctrl-fs').value*sc;
  const color=document.getElementById('ctrl-color').value;
  const lh=fs*1.35, lhSm=fs*0.6;
  const show={
    dist: document.querySelector('#stog-dist input').checked,
    pace: document.querySelector('#stog-pace input').checked,
    hr:   document.querySelector('#stog-hr input').checked,
    time: document.querySelector('#stog-time input').checked,
    elev: document.querySelector('#stog-elev input').checked,
    cad:  document.querySelector('#stog-cad input').checked,
  };
  const items=[];
  if(show.dist) items.push({lbl:'JARAK',   val:(a.distance/1000).toFixed(2)+' km'});
  if(show.pace) items.push({lbl:'AVG PACE',val:sp(a.moving_time/(a.distance/1000))+' /km'});
  if(show.hr&&a.average_heartrate) items.push({lbl:'HEART RATE',val:Math.round(a.average_heartrate)+' bpm'});
  if(show.time) items.push({lbl:'WAKTU',   val:sd(a.moving_time)});
  if(show.elev&&a.total_elevation_gain) items.push({lbl:'ELEVASI',val:Math.round(a.total_elevation_gain)+' m'});
  if(show.cad&&a.average_cadence) items.push({lbl:'CADENCE', val:Math.round(a.average_cadence*2)+' spm'});
  if(!items.length) return;
  const padX = S.align==='center'?W/2 : S.align==='right'?W-80*sc : 80*sc;
  let curY = H*(yPct/100);
  const blockH = items.length*(lh+lhSm+10*sc)+24*sc;
  if(S.bg==='dark'){
    ctx.fillStyle='rgba(0,0,0,0.58)';
    const bx=S.align==='center'?W/2-240*sc:S.align==='right'?W-550*sc:40*sc;
    rrect(ctx,bx,curY-20*sc,460*sc,blockH,18*sc); ctx.fill(); curY+=10*sc;
  }
  for(const item of items){
    ctx.textAlign=S.align;
    if(S.bg==='pill'){
      ctx.font=`500 ${Math.round(fs*.52)}px 'DM Mono',monospace`;
      const vw=ctx.measureText(item.val).width+44*sc;
      ctx.fillStyle='rgba(0,0,0,0.55)';
      const px=S.align==='center'?padX-vw/2:S.align==='right'?padX-vw:padX-14*sc;
      rrect(ctx,px,curY-lhSm-2*sc,vw,lh+lhSm+6*sc,12*sc); ctx.fill();
    }
    ctx.font=`400 ${Math.round(fs*.4)}px 'DM Mono',monospace`;
    ctx.fillStyle='rgba(255,255,255,0.42)';
    ctx.fillText(item.lbl,padX,curY);
    curY+=lhSm;
    ctx.font=`900 ${fs}px 'Barlow Condensed',sans-serif`;
    ctx.fillStyle=color;
    ctx.fillText(item.val,padX,curY);
    curY+=lh+2*sc;
  }
}
// Drag & touch untuk overlay teks (khusus template kartu)
canvas.addEventListener('mousedown',startDrag);
canvas.addEventListener('touchstart',startDrag);
canvas.addEventListener('mousemove',onDrag);
canvas.addEventListener('touchmove',onDrag);
canvas.addEventListener('mouseup',endDrag);
canvas.addEventListener('mouseleave',endDrag);
canvas.addEventListener('touchend',endDrag);

function getPointerPos(e){
  if(e.touches) return {x:e.touches[0].clientX-canvas.getBoundingClientRect().left, y:e.touches[0].clientY-canvas.getBoundingClientRect().top};
  return {x:e.offsetX, y:e.offsetY};
}
function startDrag(e){
  if(!(S.selTpl && S.selTpl.isCard && S.selAct)) return;
  const pos=getPointerPos(e);
  // Cek dekat jarak atau hr
  const d=S.overlayPos.dist, h=S.overlayPos.hr;
  if(Math.abs(pos.x-d.x)<100 && Math.abs(pos.y-d.y)<40){ S.drag={active:true,type:'dist',offsetX:pos.x-d.x,offsetY:pos.y-d.y}; }
  else if(Math.abs(pos.x-h.x)<100 && Math.abs(pos.y-h.y)<40){ S.drag={active:true,type:'hr',offsetX:pos.x-h.x,offsetY:pos.y-h.y}; }
}
function onDrag(e){
  if(!S.drag.active) return;
  e.preventDefault();
  const pos=getPointerPos(e);
  if(S.drag.type==='dist'){ S.overlayPos.dist={x:pos.x-S.drag.offsetX,y:pos.y-S.drag.offsetY}; doRender(); }
  else if(S.drag.type==='hr'){ S.overlayPos.hr={x:pos.x-S.drag.offsetX,y:pos.y-S.drag.offsetY}; doRender(); }
}
function endDrag(){ S.drag.active=false; }

function rrect(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

// CONTROLS
function syncStog(cb){ cb.closest('.stog').classList.toggle('on',cb.checked); }
function setAlign(a){ S.align=a; ['left','center','right'].forEach(v=>document.getElementById('al-'+v).classList.toggle('on',v===a)); doRender(); }
function setBg(b){ S.bg=b; ['none','dark','pill'].forEach(v=>document.getElementById('bg-'+v).classList.toggle('on',v===b)); doRender(); }
function upReadouts(){ document.getElementById('cv-y').textContent=document.getElementById('ctrl-y').value+'%'; document.getElementById('cv-fs').textContent=document.getElementById('ctrl-fs').value; }

// DOWNLOAD / SHARE
function doDownload(){ if(!S.selTpl){toast('⚠ Pilih template dulu');return;} const a=document.createElement('a');a.download='stravastick-'+Date.now()+'.png';a.href=canvas.toDataURL('image/png');a.click();toast('✓ Tersimpan!'); }
async function doShare(){
  if(!S.selTpl){toast('⚠ Pilih template dulu');return;}
  canvas.toBlob(async blob=>{
    const file=new File([blob],'stravastick.png',{type:'image/png'});
    if(navigator.canShare?.({files:[file]})){try{await navigator.share({files:[file],title:'Strava Story'});}catch{doDownload();}}
    else{doDownload();toast('Download dulu, share manual ke IG');}
  },'image/png');
}

// HINT
function updateHint(){
  const h=document.getElementById('step-hint');
  if(!S.token) h.innerHTML='<em>①</em> Connect Strava &nbsp;→&nbsp; <em>②</em> Pilih lari &nbsp;→&nbsp; <em>③</em> Pilih template';
  else if(!S.selAct) h.innerHTML='✓ Terhubung &nbsp;→&nbsp; <em>②</em> Pilih aktivitas di kiri &nbsp;→&nbsp; <em>③</em> Pilih template';
  else if(!S.selTpl) h.innerHTML='✓ Aktivitas dipilih &nbsp;→&nbsp; <em>③</em> Upload &amp; pilih template di kanan';
  else h.innerHTML='✓ Siap! Download atau share ke IG Story 🎉';
}

// UTILS
function sp(s){ if(!isFinite(s)||s<=0) return '—'; return `${Math.floor(s/60)}:${Math.round(s%60).toString().padStart(2,'0')}`; }
function sd(s){ const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=Math.round(s%60).toString().padStart(2,'0'); return h>0?`${h}:${m.toString().padStart(2,'0')}:${sc}`:`${m}:${sc}`; }
function toast(m){ const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');clearTimeout(toast._t);toast._t=setTimeout(()=>e.classList.remove('show'),2500); }

// INIT
parseURL();
upReadouts();
</script>
